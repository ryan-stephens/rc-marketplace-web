server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — all non-proxied routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all Vendure API traffic to the server container
    location /shop-api {
        proxy_pass http://server:3000/shop-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward Vendure auth token header from responses
        proxy_pass_header vendure-auth-token;
    }

    location /admin-api {
        proxy_pass http://server:3000/admin-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass_header vendure-auth-token;
    }

    location /admin {
        proxy_pass http://server:3000/admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /assets {
        proxy_pass http://server:3000/assets;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /mailbox {
        proxy_pass http://server:3000/mailbox;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
